# Agent 공통 변수 — 모든 host에 적용
# ansible_user는 inventory hostvars에서 OS별로 override (gen-inventory.sh가 생성)

ansible_ssh_private_key_file: ~/.ssh/engine-key.pem
ansible_ssh_common_args: >-
  -o StrictHostKeyChecking=no
  -o ProxyJump=bastion

# Agent 바이너리 — bastion에서 사전 다운로드 후 agent/ansible/files/binaries/에 복사
# OS family에 따라 분기:
#   linux: assessment-agent-linux
#   windows: assessment-agent.exe (WinRM playbook 미구현)
agent_binary_linux: assessment-agent-linux
agent_binary_windows: assessment-agent.exe

# Engine MQ 접속 정보 — engine terraform output에서 가져옴 (gen-inventory.sh가 inject)
# 인벤토리에 다음 변수가 있어야 함:
#   engine_mq_host: <mq-vm 사설 IP>
#   engine_mq_port: 5672
