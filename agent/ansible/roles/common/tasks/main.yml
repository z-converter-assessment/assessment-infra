- name: Create persistent journal directory
  ansible.builtin.file:
    path: /var/log/journal
    state: directory
    mode: "2755"
    owner: root
    group: root
  notify: restart journald

- name: Reset machine-id -- check flag
  ansible.builtin.stat:
    path: "{{ agent_dir }}/.machine-id-reset"
  register: machine_id_flag

- name: Reset machine-id
  ansible.builtin.shell: rm -f /etc/machine-id && systemd-machine-id-setup
  when: machine_id_flag.stat.exists == false

- name: Ensure agent working directory exists (for flag file)
  ansible.builtin.file:
    path: "{{ agent_dir }}"
    state: directory
    mode: "0750"
  when: machine_id_flag.stat.exists == false

- name: Touch machine-id reset flag
  ansible.builtin.file:
    path: "{{ agent_dir }}/.machine-id-reset"
    state: touch
    mode: "0600"
  when: machine_id_flag.stat.exists == false

- name: Create swapfile
  ansible.builtin.command: dd if=/dev/zero of=/swapfile bs=1M count=1024
  args:
    creates: /swapfile
  when: ansible_memtotal_mb < 1024

- name: Set swapfile permissions
  ansible.builtin.file:
    path: /swapfile
    mode: "0600"
  when: ansible_memtotal_mb < 1024

- name: Format swapfile
  ansible.builtin.command: mkswap /swapfile
  register: mkswap_result
  failed_when:
    - mkswap_result.rc != 0
    - '"mounted" not in mkswap_result.stderr'
  when: ansible_memtotal_mb < 1024

- name: Enable swapfile
  ansible.builtin.command: swapon /swapfile
  register: swapon_result
  failed_when:
    - swapon_result.rc != 0
    - '"already" not in swapon_result.stderr'
    - '"busy" not in swapon_result.stderr'
  when: ansible_memtotal_mb < 1024

- name: Add swapfile to fstab
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present
  when: ansible_memtotal_mb < 1024

- name: Force IPv4 for apt (IPv6 not routed on agent subnet)
  ansible.builtin.copy:
    content: 'Acquire::ForceIPv4 "true";'
    dest: /etc/apt/apt.conf.d/99force-ipv4
    mode: "0644"
  when: ansible_os_family == 'Debian'

- name: Refresh apt cache
  ansible.builtin.apt:
    update_cache: true
  when: ansible_os_family == 'Debian'
  ignore_errors: true

# agent 런타임이 inventory 수집에 사용. 없으면 폴백되지만 일부 필드 null → 비핵심.
# (lsblk=util-linux. dbus-uuidgen은 패키지명이 배포판마다 달라 base image·machine-id에 의존)
# ignore_errors: 레거시 노드(예: ubuntu18.04 python3.6→3.8)는 apt/dnf 모듈용 python 바인딩이
# 없어 본 task가 실패할 수 있음. deps는 비핵심이므로 배포(binary·service)를 막지 않도록 무시한다.
- name: Install base runtime dependencies (Debian)
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - util-linux
    state: present
  when: ansible_os_family == 'Debian'
  ignore_errors: true

- name: Install base runtime dependencies (RedHat)
  ansible.builtin.dnf:
    name:
      - ca-certificates
      - curl
      - util-linux
    state: present
  when: ansible_os_family == 'RedHat'
  ignore_errors: true

# ── SELinux permissive (RHEL 계열만) ──────────────────────────────
# RHEL 계열은 SELinux enforcing 기본이라, agent 가 런타임에 받은 ZDM install.sh 를
# 비표준 컨텍스트(var_lib_t/tmp_t)에서 실행하려다 AVC denial 로 실패한다(ADR-0012).
# Ubuntu(AppArmor·커스텀 프로파일 없음 → 사실상 unconfined)와 동작을 일치시키기 위해
# 테스트 플릿에서는 permissive 로 내린다. enforcing→permissive 전환은 재부팅 불필요.

- name: Install SELinux python bindings (RedHat)
  ansible.builtin.dnf:
    name: python3-libselinux
    state: present
  when: ansible_os_family == 'RedHat'

- name: Set SELinux to permissive (RedHat)
  ansible.posix.selinux:
    policy: targeted
    state: permissive
  when: ansible_os_family == 'RedHat'

- name: Create assessment-agent group
  ansible.builtin.group:
    name: "{{ agent_group }}"
    system: true
    state: present

- name: Create assessment-agent user
  ansible.builtin.user:
    name: "{{ agent_user }}"
    group: "{{ agent_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/agent-worker
    create_home: false
    state: present

- name: Create agent working directory
  ansible.builtin.file:
    path: /var/lib/agent-worker
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_group }}"
    mode: "0750"

# worker가 result 파일·idempotency 마커를 쓰는 서브디렉터리.
# worker self-create를 보장 못 하므로 선생성 (WORKER_STATE_DIR 기본 /var/lib/agent-worker).
- name: Create agent worker subdirectories
  ansible.builtin.file:
    path: "{{ agent_dir }}/{{ item }}"
    state: directory
    owner: "{{ agent_user }}"
    group: "{{ agent_group }}"
    mode: "0750"
  loop:
    - results
    - done

# worker 는 root 로 실행되고(agent_service 유닛 User=root) ZDM install.sh 를 직접 execve 한다.
# 바이너리가 sudo 를 호출하지 않으므로 과거의 NOPASSWD: ALL 그랜트는 무용지물이자
# 불필요한 위험(서비스 계정에 무제한 sudo) — 기배포 호스트에서도 제거한다.
- name: Remove obsolete NOPASSWD sudoers for assessment-agent
  ansible.builtin.file:
    path: /etc/sudoers.d/assessment-agent
    state: absent
