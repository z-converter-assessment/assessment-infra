# 참고: assessment-engine repo docs/architecture/agent.md — agent ↔ broker 페이로드 schema
- name: Create agent user
  ansible.builtin.user:
    name: agent
    system: true
    shell: /usr/sbin/nologin

- name: Create agent directory
  ansible.builtin.file:
    path: /opt/agent
    state: directory
    owner: agent
    group: agent
    mode: "0755"

- name: Copy agent binary
  ansible.builtin.copy:
    src: "{{ agent_binary_src }}"
    dest: /opt/agent/assessment-agent
    owner: agent
    group: agent
    mode: "0755"
  notify: restart agent

- name: Install agent systemd unit
  ansible.builtin.template:
    src: agent.service.j2
    dest: /etc/systemd/system/agent.service
    mode: "0644"
  notify:
    - reload systemd
    - restart agent

- name: Enable and start agent
  ansible.builtin.systemd:
    name: agent
    enabled: true
    state: started
