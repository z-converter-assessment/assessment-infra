- name: Install stress-ng (Debian)
  ansible.builtin.apt:
    name: stress-ng
    state: present
  when: ansible_os_family == 'Debian'

- name: Install stress-ng (RedHat)
  ansible.builtin.dnf:
    name: stress-ng
    state: present
  when: ansible_os_family == 'RedHat'

- name: Render stress-ng.service
  ansible.builtin.template:
    src: stress-ng.service.j2
    dest: /etc/systemd/system/stress-ng.service
    mode: "0644"

- name: Enable and start stress-ng
  ansible.builtin.systemd:
    name: stress-ng
    enabled: true
    state: started
    daemon_reload: true
