# ── Linux ─────────────────────────────────────────────────────────

- name: Create agent env directory
  ansible.builtin.file:
    path: "{{ agent_env_dir }}"
    state: directory
    owner: root
    group: "{{ agent_group }}"
    mode: "0750"
  when: ansible_system != 'Win32NT'

- name: Render agent.env
  ansible.builtin.template:
    src: agent.env.j2
    dest: "{{ agent_env_dir }}/agent.env"
    owner: root
    group: "{{ agent_group }}"
    mode: "0640"
  when: ansible_system != 'Win32NT'
  notify: restart assessment-agent

- name: Render agent.env.local
  ansible.builtin.template:
    src: agent.env.local.j2
    dest: "{{ agent_env_dir }}/agent.env.local"
    owner: root
    group: "{{ agent_group }}"
    mode: "0640"
  when: ansible_system != 'Win32NT'
  no_log: true
  notify: restart assessment-agent

# ── Windows — 시스템 환경변수로 MQ 접속 정보 주입 ─────────────────

- name: Set MQ env vars (Windows)
  ansible.windows.win_environment:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    level: machine
  loop:
    - name: RABBITMQ_HOST
      value: "{{ engine_mq_host }}"
    - name: RABBITMQ_PORT
      value: "{{ engine_mq_port | default(5672) | string }}"
    - name: RABBITMQ_VHOST
      value: "{{ vault_mq_vhost | default('assessment') }}"
    - name: RABBITMQ_EXCHANGE
      value: "{{ mq_exchange }}"
    - name: RABBITMQ_ROUTING_KEY_INVENTORY
      value: "{{ mq_routing_key_inventory }}"
    - name: RABBITMQ_ROUTING_KEY_METRICS
      value: "{{ mq_routing_key_metrics }}"
    - name: RABBITMQ_ROUTING_KEY_ERROR
      value: "{{ mq_routing_key_error }}"
    - name: RABBITMQ_TLS_ENABLED
      value: "{{ rabbitmq_tls_enabled | string | lower }}"
    - name: WORKER_TASK_EXCHANGE
      value: "{{ mq_task_exchange }}"
    - name: WORKER_TASK_QUEUE_PREFIX
      value: "{{ mq_task_queue_prefix }}"
    - name: WORKER_TASK_RESULT_KEY
      value: "{{ mq_task_result_key }}"
    - name: WORKER_DOWNLOAD_ALLOWED_HOSTS
      value: "{{ worker_download_allowed_hosts }}"
    - name: AGENT_INTERVAL_SEC
      value: "{{ agent_interval_sec | string }}"
    - name: AGENT_INVENTORY_REFRESH_SEC
      value: "{{ agent_inventory_refresh_sec | string }}"
    - name: AGENT_DRAIN_GRACE_SEC
      value: "{{ agent_drain_grace_sec | string }}"
    - name: AGENT_DRAIN_TERM_SEC
      value: "{{ agent_drain_term_sec | string }}"
    - name: AGENT_DRAIN_PUBLISH_SEC
      value: "{{ agent_drain_publish_sec | string }}"
    - name: WORKER_STATE_DIR
      value: "{{ agent_worker_state_dir }}"
    - name: WORKER_TMP_DIR
      value: "{{ agent_worker_tmp_dir }}"
  when: ansible_system == 'Win32NT'
  notify: restart AssessmentAgent

# WORKER_STATE_DIR 실존 필수 — worker가 download·results·done·running 마커를 여기 쓴다.
# (TMP_DIR=C:\Windows\Temp는 시스템 기본 존재라 생성 불요)
- name: Create worker state directory (Windows)
  ansible.windows.win_file:
    path: "{{ agent_worker_state_dir }}"
    state: directory
  when: ansible_system == 'Win32NT'

- name: Set MQ credentials (Windows)
  ansible.windows.win_environment:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    level: machine
  loop:
    - name: RABBITMQ_USER
      value: "{{ vault_mq_user }}"
    - name: RABBITMQ_PASS
      value: "{{ vault_mq_password }}"
    - name: RABBITMQ_WORKER_USER
      value: "{{ vault_mq_user }}"
    - name: RABBITMQ_WORKER_PASS
      value: "{{ vault_mq_password }}"
  when: ansible_system == 'Win32NT'
  no_log: true
  notify: restart AssessmentAgent
