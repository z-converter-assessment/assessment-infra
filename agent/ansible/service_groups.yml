# 서비스 배치 정의 — 수동 관리 (gen_inventory.py 생성 대상 아님)
# 각 host는 inventory.yml에서 IP·접속 정보를 상속받음.
#
# service_db        : PostgreSQL
# service_cache     : Redis
# service_container : Docker
# service_web       : nginx (미사용 시 hosts: 비움)
# service_mq        : RabbitMQ (미사용 시 hosts: 비움)
# service_monitor   : (미사용 시 hosts: 비움)
# service_app       : (미사용 시 hosts: 비움)

all:
  children:
    service_db:
      hosts:
        agent-debian12-1:
        agent-debian13-1:

    service_cache:
      hosts:
        agent-debian13-1:
        agent-ubuntu2204-1:

    service_container:
      hosts:
        agent-ubuntu2204-1:
        agent-ubuntu2404-1:

    service_web:
      hosts: {}

    service_mq:
      hosts: {}

    service_monitor:
      hosts: {}

    service_app:
      hosts: {}
