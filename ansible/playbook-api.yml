- name: API VM — assessment-engine API
  hosts: api
  become: true
  vars:
    app_service_name: assessment-api
    app_run_alembic: true
    # TODO: assessment-engine entry point 확인 후 수정
    app_exec_start: "{{ app_venv }}/bin/uvicorn assessment_engine.main:app --host 0.0.0.0 --port 8000"
    app_env:
      # TODO: 실제 환경변수 키 이름은 assessment-engine docs/operations/env.md 참조
      DATABASE_URL: "postgresql://{{ vault_db_user }}:{{ vault_db_password }}@{{ hostvars['db-vm'].ansible_host }}/{{ vault_db_name }}"
      BROKER_URL: "amqp://{{ vault_mq_user }}:{{ vault_mq_password }}@{{ hostvars['mq-vm'].ansible_host }}/{{ vault_mq_vhost }}"
      SECRET_KEY: "{{ vault_app_secret_key }}"
  roles:
    - app
