---
- name: install python3-venv
  apt:
    name:
      - python3
      - python3-venv
      - python3-pip
    state: present
    update_cache: true

- name: create app group
  group:
    name: "{{ app_group }}"
    state: present

- name: create app user
  user:
    name: "{{ app_user }}"
    group: "{{ app_group }}"
    home: "{{ app_dir }}"
    shell: /usr/sbin/nologin
    system: true
    create_home: true
    state: present

- name: create virtualenv
  command: python3 -m venv {{ app_venv }}
  args:
    creates: "{{ app_venv }}/bin/python"
  become_user: "{{ app_user }}"

