---
# 설치 → 정지 → Cinder 마운트 → 재기동 순서.
# 신규 설치라 기존 데이터 없음 — 마운트 후 mnesia가 빈 Cinder 위에 재초기화됨.
# Ubuntu default repo의 RabbitMQ는 구버전이라 cloudsmith repo 사용.

- name: add RabbitMQ team apt signing key
  apt_key:
    url: https://keys.openpgp.org/vks/v1/by-fingerprint/0A9AF2115F4687BD29803A206B73A36E6026DFCA
    state: present

- name: add Cloudsmith Erlang apt repository
  apt_repository:
    repo: "deb https://ppa1.rabbitmq.com/rabbitmq/rabbitmq-erlang/deb/ubuntu noble main"
    state: present
    filename: rabbitmq-erlang

- name: add Cloudsmith RabbitMQ server apt repository
  apt_repository:
    repo: "deb https://ppa1.rabbitmq.com/rabbitmq/rabbitmq-server/deb/ubuntu noble main"
    state: present
    filename: rabbitmq-server
    update_cache: true

- name: install Erlang and rabbitmq-server
  apt:
    name:
      - erlang
      - rabbitmq-server
    state: present
    update_cache: false

- name: stop rabbitmq before volume mount
  service:
    name: rabbitmq-server
    state: stopped

- name: check if Cinder volume has filesystem
  command: blkid -s TYPE -o value {{ mq_volume_device }}
  register: mq_blkid
  changed_when: false
  failed_when: false

- name: format Cinder volume as ext4
  command: mkfs.ext4 {{ mq_volume_device }}
  when: mq_blkid.stdout == ""

- name: mount Cinder volume at rabbitmq data dir
  mount:
    path: /var/lib/rabbitmq
    src: "{{ mq_volume_device }}"
    fstype: ext4
    opts: defaults
    state: mounted

- name: set ownership
  file:
    path: /var/lib/rabbitmq
    owner: rabbitmq
    group: rabbitmq
    mode: "0750"

- name: start rabbitmq-server
  service:
    name: rabbitmq-server
    state: started
    enabled: true

- name: enable management plugin
  command: rabbitmq-plugins enable rabbitmq_management
  register: plugins_result
  changed_when: "'Plugin configuration unchanged' not in plugins_result.stdout"
  notify: restart rabbitmq-server

- name: add vhost
  command: rabbitmqctl add_vhost {{ vault_mq_vhost }}
  register: vhost_result
  changed_when: "'already exists' not in vhost_result.stderr"
  failed_when: vhost_result.rc != 0 and 'already exists' not in vhost_result.stderr

- name: add user
  command: rabbitmqctl add_user {{ vault_mq_user }} {{ vault_mq_password }}
  register: user_result
  changed_when: "'already exists' not in user_result.stderr"
  failed_when: user_result.rc != 0 and 'already exists' not in user_result.stderr

- name: check current user permissions
  command: rabbitmqctl list_user_permissions {{ vault_mq_user }}
  register: current_perms
  changed_when: false
  failed_when: false

- name: set user permissions on vhost
  command: rabbitmqctl set_permissions -p {{ vault_mq_vhost }} {{ vault_mq_user }} ".*" ".*" ".*"
  when: vault_mq_vhost not in current_perms.stdout

- name: delete default guest user
  command: rabbitmqctl delete_user guest
  register: guest_del
  changed_when: "'does not exist' not in guest_del.stderr"
  failed_when: guest_del.rc != 0 and 'does not exist' not in guest_del.stderr
