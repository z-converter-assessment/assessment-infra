---
- name: install redis-server
  apt:
    name: redis-server
    state: present
    update_cache: true

- name: listen on all interfaces
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: "^bind "
    line: "bind 0.0.0.0"
  notify: restart redis-server

- name: disable protected-mode (SG가 네트워크 경계 담당)
  lineinfile:
    path: /etc/redis/redis.conf
    regexp: "^protected-mode"
    line: "protected-mode no"
  notify: restart redis-server

- name: enable and start redis-server
  service:
    name: redis-server
    state: started
    enabled: true
