name: deploy-engine

on:
  repository_dispatch:
    types: [engine-release]

jobs:
  deploy:
    runs-on: self-hosted
    environment: openstack-staging

    steps:
      - name: checkout assessment-infra
        uses: actions/checkout@v4

      - name: write terraform.tfvars
        env:
          ENGINE_TFVARS: ${{ secrets.ENGINE_TFVARS }}
        run: printf '%s' "$ENGINE_TFVARS" > engine/terraform/terraform.tfvars

      - name: terraform init
        run: |
          cd engine/terraform
          terraform init -input=false

      - name: terraform plan
        id: tf_plan
        run: |
          cd engine/terraform
          set +e
          terraform plan -detailed-exitcode -out=tfplan
          code=$?
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          [ "$code" -eq 1 ] && exit 1   # 1=진짜 에러만 실패
          exit 0                         # 0=변경없음 / 2=변경있음 정상 통과

      - name: terraform apply (변경 있을 때만)
        if: steps.tf_plan.outputs.exitcode == '2'
        run: |
          cd engine/terraform
          terraform apply -auto-approve tfplan

      - name: generate inventory
        run: python3 scripts/gen_inventory.py --scope engine

      - name: ansible-playbook engine
        run: |
          cd engine/ansible
          ansible-playbook -i inventory.yml playbook-engine.yml \
            --vault-password-file ~/.vault-pass \
            --extra-vars "engine_version=${{ github.event.client_payload.engine_version }} ghcr_token=${{ secrets.GITHUB_TOKEN }}"

      # ollama 모델 tarball(~1.6GB)은 .gitignore라 checkout에 없고, checkout(clean)이
      # 워크스페이스를 비우므로 bastion 영속 경로에서 매 run 복사한다. (vault/tfstate와 동일 패턴)
      # 사전 준비: bastion에서 `ollama pull gemma2:2b` 후
      #   tar czf /home/debian/ollama-artifacts/ollama-models.tar.gz -C /usr/share/ollama .ollama
      - name: stage ollama model artifact (bastion-local)
        run: |
          cp /home/debian/ollama-artifacts/ollama-models.tar.gz \
            engine/ansible/files/ollama/ollama-models.tar.gz

      - name: ansible-playbook ai
        run: |
          cd engine/ansible
          ansible-playbook -i inventory.yml playbook-ai.yml \
            --vault-password-file ~/.vault-pass \
            --extra-vars "engine_version=${{ github.event.client_payload.engine_version }} ghcr_token=${{ secrets.GITHUB_TOKEN }}"
