name: deploy-engine

on:
  repository_dispatch:
    types: [engine-release]

jobs:
  deploy:
    runs-on: self-hosted
    environment: openstack-staging

    steps:
      - name: checkout assessment-infra
        uses: actions/checkout@v4

      - name: terraform init
        run: |
          cd engine/terraform
          terraform init -input=false

      - name: terraform plan
        id: tf_plan
        run: |
          cd engine/terraform
          terraform plan -detailed-exitcode -out=tfplan 2>&1
          echo "exitcode=$?" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: terraform apply (변경 있을 때만)
        if: steps.tf_plan.outputs.exitcode == '2'
        run: |
          cd engine/terraform
          terraform apply -auto-approve tfplan

      - name: generate inventory
        run: python3 scripts/gen_inventory.py

      - name: ansible-playbook engine
        run: |
          cd engine/ansible
          ansible-playbook -i inventory.yml playbook-engine.yml \
            --vault-password-file ~/.vault-pass \
            --extra-vars "engine_version=${{ github.event.client_payload.engine_version }} ghcr_token=${{ secrets.GITHUB_TOKEN }}"

      - name: ansible-playbook ai
        run: |
          cd engine/ansible
          ansible-playbook -i inventory.yml playbook-ai.yml \
            --vault-password-file ~/.vault-pass \
            --extra-vars "engine_version=${{ github.event.client_payload.engine_version }} ghcr_token=${{ secrets.GITHUB_TOKEN }}"
