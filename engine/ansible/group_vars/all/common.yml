ansible_user: debian
ansible_ssh_private_key_file: ~/.ssh/engine-key.pem

# Python (Debian 13 Trixie 기본 Python 3.13)
python_version: "3.13"

# Cinder 볼륨 디바이스 (attach 순서상 첫 번째 추가 디스크)
db_volume_device: /dev/vdb
mq_volume_device: /dev/vdb

# PostgreSQL
pg_version: "16"
engine_subnet_cidr: "10.0.10.0/24"

# App (api-vm · worker-vm 공통)
app_user: assessment
app_group: assessment
app_dir: /opt/assessment
app_venv: "{{ app_dir }}/venv"
